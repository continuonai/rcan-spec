name: Release Notify

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to notify for (defaults to latest tag)'
        required: false

permissions:
  contents: write

jobs:
  notify-sdks:
    name: File SDK update issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --title "RCAN Spec ${{ steps.tag.outputs.tag }}" \
              --generate-notes
          fi

      - uses: ./.github/actions/emit-version-tuple
        with:
          project: rcan-spec
          ran: ${{ secrets.RCAN_SPEC_RELEASE_RAN }}
          field: protocol_version
          value: ${{ steps.tag.outputs.version }}
          depends_on: '{}'
          pq_signing_key: ${{ secrets.RCAN_SPEC_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.RCAN_SPEC_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.RCAN_SPEC_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.RCAN_SPEC_RELEASE_KID }}
          release_tag: ${{ steps.tag.outputs.tag }}

      - name: File rcan-py update issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RCAN_SDK_PAT }}
          SPEC_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh issue create \
            --repo continuonai/rcan-py \
            --title "chore: update SDK for RCAN spec ${SPEC_TAG}" \
            --body "RCAN spec ${SPEC_TAG} released. Update SPEC_VERSION in rcan/validate.py, run tests, bump version if needed, publish to PyPI. See https://rcan.dev/changelog/" \
          || echo "Issue may already exist or PAT not configured, continuing"

      - name: File rcan-ts update issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RCAN_SDK_PAT }}
          SPEC_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh issue create \
            --repo continuonai/rcan-ts \
            --title "chore: update SDK for RCAN spec ${SPEC_TAG}" \
            --body "RCAN spec ${SPEC_TAG} released. Update SPEC_VERSION constant, run npm test and build, bump version if needed, publish to npm. See https://rcan.dev/changelog/" \
          || echo "Issue may already exist or PAT not configured, continuing"

      - name: File OpenCastor update issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RCAN_SDK_PAT }}
          SPEC_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh issue create \
            --repo craigm26/OpenCastor \
            --title "chore: update RCAN integration for spec ${SPEC_TAG}" \
            --body "RCAN spec ${SPEC_TAG} released. Update SPEC_VERSION in castor/compliance.py and ACCEPTED_RCAN_VERSIONS in validate_rcan.py, run CI, bump version if needed. See https://rcan.dev/changelog/" \
          || echo "Issue may already exist or PAT not configured, continuing"

      - name: Summary
        run: |
          echo "## Release Notify Complete" >> $GITHUB_STEP_SUMMARY
          echo "Filed SDK update issues for ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
