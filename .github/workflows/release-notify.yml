name: Release Notify — file SDK update issues on new spec tag

on:
  push:
    tags:
      - 'v*'

jobs:
  notify-sdks:
    name: File SDK update issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: File rcan-py update issue
        # Requires RCAN_SDK_PAT secret (classic PAT with repo scope on continuonai org)
        # Without it, this step is skipped gracefully — add the secret to enable cross-repo notifications
        if: ${{ secrets.RCAN_SDK_PAT != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RCAN_SDK_PAT }}
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            await github.rest.issues.create({
              owner: 'continuonai',
              repo: 'rcan-py',
              title: `chore: update SDK for rcan-spec ${tag}`,
              body: `rcan-spec was tagged **${tag}**.\n\nPlease update rcan-py to maintain spec compatibility:\n- [ ] Review spec changelog at https://rcan.dev/changelog\n- [ ] Update conformance tests if needed\n- [ ] Bump version and release\n\nTriggered by: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
              labels: ['spec-sync'],
            });

      - name: File rcan-ts update issue
        if: ${{ secrets.RCAN_SDK_PAT != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RCAN_SDK_PAT }}
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            await github.rest.issues.create({
              owner: 'continuonai',
              repo: 'rcan-ts',
              title: `chore: update SDK for rcan-spec ${tag}`,
              body: `rcan-spec was tagged **${tag}**.\n\nPlease update @continuonai/rcan-ts to maintain spec compatibility:\n- [ ] Review spec changelog at https://rcan.dev/changelog\n- [ ] Update conformance tests if needed\n- [ ] Bump version and publish to npm\n\nTriggered by: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
              labels: ['spec-sync'],
            });

      - name: Summary (no PAT configured)
        if: ${{ secrets.RCAN_SDK_PAT == '' }}
        run: |
          echo "ℹ️ RCAN_SDK_PAT secret not configured — skipping cross-repo issue creation."
          echo "To enable: add a classic PAT with repo scope as RCAN_SDK_PAT in continuonai/rcan-spec Settings → Secrets."
