name: SDK Smoke Test

on:
  push:
    branches: [master]
  schedule:
    # Daily at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  rcan-py:
    name: rcan-py smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: continuonai/rcan-py
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install rcan-py
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q --tb=short

  rcan-ts:
    name: rcan-ts smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: continuonai/rcan-ts
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  update-status:
    name: Update SDK status badge
    runs-on: ubuntu-latest
    needs: [rcan-py, rcan-ts]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write sdk-status.json
        run: |
          cat > public/sdk-status.json << EOF
          {
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "rcan_py": "${{ needs.rcan-py.result }}",
            "rcan_ts": "${{ needs.rcan-ts.result }}"
          }
          EOF

      - name: Commit status file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update sdk-status.json"
          file_pattern: public/sdk-status.json
