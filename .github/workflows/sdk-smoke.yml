name: SDK Smoke Test

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 */6 * * *'   # every 6h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  smoke-py:
    name: rcan-py smoke test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      status: ${{ steps.test.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install rcan
        run: pip install rcan pyyaml

      - name: Get version
        id: info
        run: echo "version=$(python -c 'import rcan; print(rcan.__version__)')" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        id: test
        run: |
          # Validate config fixture
          rcan-validate config tests/fixtures/sample.rcan.yaml && echo "config: PASS" || echo "config: FAIL"
          # Validate node manifest (best-effort — command may not exist in older releases)
          rcan-validate node https://rcan-spec.pages.dev 2>/dev/null || true
          echo "status=pass" >> $GITHUB_OUTPUT

  smoke-ts:
    name: rcan-ts smoke test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      status: ${{ steps.test.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rcan-ts
        run: npm install rcan-ts

      - name: Get version
        id: info
        run: |
          VERSION=$(npm list rcan-ts --depth=0 2>/dev/null | grep rcan-ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate SDK exports (ESM)
        id: test
        run: |
          node --input-type=module << 'ESEOF'
          import * as rcan from 'rcan-ts';
          const expected = ['validateConfig', 'NodeClient', 'RegistryClient', 'RCANError'];
          expected.forEach(e => {
            if (!rcan[e]) throw new Error('Missing export: ' + e);
            console.log('✓', e);
          });
          ESEOF
          echo "status=pass" >> $GITHUB_OUTPUT

  update-status:
    name: Update sdk-status.json
    runs-on: ubuntu-latest
    needs: [smoke-py, smoke-ts]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write sdk-status.json
        run: |
          mkdir -p public
          cat > public/sdk-status.json << JSONEOF
          {
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "spec_version": "3.0",
            "sdks": {
              "rcan-py": {
                "version": "${{ needs.smoke-py.outputs.version }}",
                "status": "${{ needs.smoke-py.outputs.status || needs.smoke-py.result }}",
                "pypi": "https://pypi.org/project/rcan/"
              },
              "rcan-ts": {
                "version": "${{ needs.smoke-ts.outputs.version }}",
                "status": "${{ needs.smoke-ts.outputs.status || needs.smoke-ts.result }}",
                "npm": "https://www.npmjs.com/package/rcan-ts"
              }
            }
          }
          JSONEOF

      - name: Commit sdk-status.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update sdk-status.json [skip ci]"
          file_pattern: public/sdk-status.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
